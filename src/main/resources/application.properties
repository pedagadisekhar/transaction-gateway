spring.application.name=transaction-gateway

# PostgreSQL / HikariCP — sized for 250 concurrent HTTP threads + Kafka consumers
spring.datasource.url=jdbc:postgresql://postgres:5432/swiftpay
spring.datasource.username=postgres
spring.datasource.password=2208
spring.datasource.hikari.maximum-pool-size=120
spring.datasource.hikari.minimum-idle=30
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=HikariPool
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.leak-detection-threshold=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# Redis — one SETNX per payment; pool must exceed concurrent HTTP threads
spring.redis.host=redis
spring.redis.port=6379
spring.redis.timeout=3s
spring.redis.lettuce.pool.max-active=300
spring.redis.lettuce.pool.max-idle=100
spring.redis.lettuce.pool.min-idle=50
spring.redis.lettuce.pool.max-wait=5000

# Kafka
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=ledger-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.max-poll-records=500
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.fetch-min-size=65536
spring.kafka.consumer.fetch-max-wait=100
spring.kafka.consumer.properties.max.partition.fetch.bytes=52428800
spring.kafka.listener.concurrency=16
spring.kafka.listener.ack-mode=record
spring.kafka.listener.type=single

spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=65536
spring.kafka.producer.linger-ms=5
spring.kafka.producer.buffer-memory=67108864
spring.kafka.producer.compression-type=lz4
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=60000
spring.kafka.producer.properties.max.request.size=1048576
spring.kafka.producer.properties.request.timeout.ms=15000
spring.kafka.producer.properties.retry.backoff.ms=50

# Tomcat
server.tomcat.max-threads=300
server.tomcat.min-spare-threads=50
server.tomcat.accept-count=300
server.tomcat.max-connections=2000
server.tomcat.connection-timeout=20000

# Logging — reduce I/O under load
logging.level.root=WARN
logging.level.com.swiftpay.transaction_gateway=INFO
logging.level.org.springframework.kafka=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
